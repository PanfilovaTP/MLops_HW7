name: Model Deployment

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUD_TOKEN: ${{ secrets.CLOUD_TOKEN }}
      MODEL_VERSION: ${{ secrets.MODEL_VERSION }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare image metadata
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          VERSION_TAG="${MODEL_VERSION:-${GITHUB_SHA}}"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "$GITHUB_ENV"
          echo "VERSION_TAG=${VERSION_TAG}" >> "$GITHUB_ENV"

      - name: Build Docker image
        run: |
          docker build -t "${IMAGE_NAME}:${VERSION_TAG}" -t "${IMAGE_NAME}:${GITHUB_SHA}" .

      - name: Smoke test /health
        run: |
          docker run -d --name hw7-smoke -p 8000:8000 -e MODEL_VERSION="${VERSION_TAG}" "${IMAGE_NAME}:${VERSION_TAG}"
          sleep 10
          curl --fail http://localhost:8000/health
          curl --fail -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"x": [1,2,3]}'
          docker rm -f hw7-smoke

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push Docker image
        run: |
          docker push "${IMAGE_NAME}:${VERSION_TAG}"
          docker push "${IMAGE_NAME}:${GITHUB_SHA}"

      - name: Deploy via API
        run: |
          if [ -z "${CLOUD_TOKEN}" ]; then
            echo "CLOUD_TOKEN is not set. Deployment API call is skipped for local/homework repository."
            exit 0
          fi
          curl --fail -X POST https://api.cloudprovider/deploy \
            -H "Authorization: Bearer ${CLOUD_TOKEN}" \
            -d "image=${IMAGE_NAME}:${VERSION_TAG}"
